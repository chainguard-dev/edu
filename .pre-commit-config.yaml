# Pre-commit hooks for security scanning and linting.
#
# Linting (eslint/markdownlint) uses pre-commit-managed hook environments so
# contributors editing docs do not need a local `npm install`, and CI needs
# only Python + pre-commit. Hooks run on changed files only (see the
# pre-commit CI workflow's --from-ref/--to-ref); the repo carries a backlog of
# pre-existing lint errors that are fixed opportunistically as files are touched.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      # content/platform/chainctl/chainctl-docs/ is generated upstream and synced
      # in verbatim (see .github/actions/integrate-platform-docs). Its cobra-
      # generated code fences carry trailing whitespace that reappears on every
      # sync, so exclude it from the whitespace formatters (also unlinted below).
      - id: trailing-whitespace
        exclude: ^content/platform/chainctl/chainctl-docs/
        # Preserve two-space hard line breaks in Markdown; strip other trailing
        # whitespace as usual.
        args: ['--markdown-linebreak-ext=md']
      - id: end-of-file-fixer
        exclude: ^content/platform/chainctl/chainctl-docs/
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key
        # These files contain example PEM private-key material as documentation
        # (redaction examples, allowlist patterns, or a throwaway tutorial key),
        # not real credentials. Exclude them to avoid false positives.
        exclude: ^(\.github/workflows/compile-docs\.yml|content/ai-docs-security\.md|content/open-source/sigstore/cosign/cosign-manual-way\.md)$
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/gitleaks/gitleaks
    # >= v8.19.0 required: .github/gitleaks.toml uses multiple [[rules.allowlist]]
    # blocks, which older gitleaks parses as a slice-vs-map schema error.
    rev: 2ca41cc1372d1e939a6a879f18cdc19fc1cac1ce  # frozen: v8.30.0
    hooks:
      - id: gitleaks
        args: ['--config', '.github/gitleaks.toml']

  # GitHub Actions linting. These also run as standalone CI workflows
  # (zizmor.yaml uploads SARIF to code scanning, actionlint.yaml adds shellcheck
  # + annotations); the hooks give the same checks locally on changed files.
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
    hooks:
      - id: zizmor # auto-loads .github/zizmor.yml

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint
        # Match the standalone actionlint.yaml workflow's shellcheck settings so
        # the hook and the workflow agree: fail only on error-severity findings
        # and skip SC2129 (sequential-redirect style).
        args: ['-shellcheck=shellcheck --severity=error --exclude=SC2129']

  - repo: https://github.com/PyCQA/bandit
    rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08  # frozen: 1.9.4
    hooks:
      - id: bandit
        # Scan the changed Python files (ratchet model), reporting medium+
        # severity. Previously used -r scripts/, which rescanned the whole tree
        # and could not mix with the filenames pre-commit appends.
        args: ['-ll']
        files: ^scripts/.*\.py$

  - repo: https://github.com/psf/black
    rev: 87928e6d6761a4a6d22250e1fee5601b3998086e  # frozen: 26.5.1
    hooks:
      - id: black
        language_version: python3
        files: \.py$

  - repo: local
    hooks:
      - id: check-compilation-script
        name: Validate compilation script
        entry: python3 -m py_compile
        language: system
        files: scripts/compile_docs.*\.py$

      - id: check-docs-size
        name: Check documentation size
        entry: bash -c 'find static/downloads -name "*.md" -size +50M -exec echo "File {} exceeds 50MB limit" \; -exec false \;'
        language: system
        pass_filenames: false

      # Content tag validation against the approved taxonomy (TAG_GUIDELINES.md).
      # Advisory (warnings only, never blocks); runs locally and in CI.
      - id: content-tags
        name: Validate content tags
        entry: python3 scripts/hooks/content_checks.py --mode tags
        language: system
        files: ^content/.*\.md$
        # chainctl reference docs are autogenerated; do not lint them.
        exclude: ^content/platform/chainctl/chainctl-docs/

      # Prose spell check (aspell). Advisory only, and local-only: the CI job
      # sets SKIP=content-spellcheck, and aspell may be absent there anyway.
      - id: content-spellcheck
        name: Spell-check content prose
        entry: python3 scripts/hooks/content_checks.py --mode spell
        language: system
        files: ^content/.*\.md$
        exclude: ^content/platform/chainctl/chainctl-docs/

  # Lint the theme's own JavaScript (assets/js, config). Uses ESLint 9 flat
  # config (eslint.config.js). @eslint/js and globals are required by that
  # config and installed into the hook's isolated environment.
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: d5675fc20c10b8c0a3dbbbf182c82b903bf409ac  # frozen: v10.7.0
    hooks:
      - id: eslint
        files: ^(assets/js|config)/.*\.js$
        additional_dependencies:
          - eslint@9.39.1
          - "@eslint/js@^9.39.0"
          - globals@^16.5.0

  # Lint Markdown content against .markdownlint-cli2.jsonc.
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 534166213006ec869b773b7ed8c6ebeaad1165d0  # frozen: v0.23.0
    hooks:
      - id: markdownlint-cli2
        # content/platform/chainctl/chainctl-docs/ is generated upstream (cobra
        # doc generator, see chainguard-dev/mono docs/chainctl-docs) and synced
        # in verbatim by .github/actions/integrate-platform-docs. It carries
        # generator-inherent violations (hard tabs, unlabeled code fences) that
        # any local fix would lose on the next sync, so it is not linted here.
        exclude: ^content/platform/chainctl/chainctl-docs/
