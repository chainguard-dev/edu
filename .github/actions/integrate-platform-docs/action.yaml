name: Integrate Platform Docs
description: Download and integrate platform docs from GCS into the academy content directory

inputs:
  storage_bucket:
    required: true
    description: "Name of GCS bucket for static files"
  project_id:
    required: true
    description: "GCP project ID"

runs:
  using: composite
  steps:
    - name: download openapi api.json spec from cloud storage
      shell: bash
      env:
        PROJECT_ID: ${{ inputs.project_id }}
        STORAGE_BUCKET: ${{ inputs.storage_bucket }}
      run: |
        gcloud --quiet storage cp --project="${PROJECT_ID}" \
          "${STORAGE_BUCKET}/enforce-openapi/api*.json" static/

    - name: download events.md from cloud storage
      shell: bash
      env:
        PROJECT_ID: ${{ inputs.project_id }}
        STORAGE_BUCKET: ${{ inputs.storage_bucket }}
      run: |
        gcloud --quiet storage cp --project="${PROJECT_ID}" \
          "${STORAGE_BUCKET}/enforce-events/events.md" content/platform/administration/cloudevents/events-reference.md

    - name: normalize events-reference.md formatting
      shell: bash
      run: |
        # Convert Windows CRLF line endings to Unix LF.
        sed -i 's/\r$//' content/platform/administration/cloudevents/events-reference.md
        # Insert blank lines around headings and fenced code blocks (MD022, MD031).
        # The source file from GCS omits them, which fails markdownlint in CI.
        python3 - << 'PYEOF'
        path = 'content/platform/administration/cloudevents/events-reference.md'
        with open(path) as f:
            lines = f.readlines()
        out, in_fence = [], False
        for i, line in enumerate(lines):
            s = line.rstrip('\n')
            is_fence   = s.startswith('```')
            is_heading = (not in_fence) and s.startswith('#')
            if is_fence or is_heading:
                if out and out[-1].strip():
                    out.append('\n')
            if is_fence:
                closing = in_fence
                in_fence = not in_fence
                out.append(line)
                if closing and i + 1 < len(lines) and lines[i + 1].strip():
                    out.append('\n')
            elif is_heading:
                out.append(line)
                if i + 1 < len(lines) and lines[i + 1].strip():
                    out.append('\n')
            else:
                out.append(line)
        final, prev_blank = [], False
        for ln in out:
            blank = not ln.strip()
            if blank and prev_blank:
                continue
            final.append(ln)
            prev_blank = blank
        with open(path, 'w') as f:
            f.writelines(final)
        PYEOF

    - name: download chainctl docs from cloud storage
      shell: bash
      env:
        PROJECT_ID: ${{ inputs.project_id }}
        STORAGE_BUCKET: ${{ inputs.storage_bucket }}
      run: |
        gcloud --quiet storage cp --recursive --project="${PROJECT_ID}" \
          "${STORAGE_BUCKET}/chainctl-docs" /tmp/

    - name: copy changed chainctl docs into academy content directory
      shell: bash
      run: |
        rsync -av --delete --exclude="_index.md" \
          "/tmp/chainctl-docs/" "content/chainguard/chainctl/"

    - name: add tags to chainctl docs by inserting line with sed
      shell: bash
      run: |
        sed '/draft: false/a tags: ["chainctl", "Reference", "Product"]' \
          -i content/chainguard/chainctl/chainctl-docs/*.md

    - name: add tags to cloudevents by inserting line with sed
      shell: bash
      run: |
        sed '/draft: false/a tags: ["Platform", "Reference", "Product"]' \
          -i content/platform/administration/cloudevents/events-reference.md

    - name: download domains.md from cloud storage
      shell: bash
      env:
        PROJECT_ID: ${{ inputs.project_id }}
        STORAGE_BUCKET: ${{ inputs.storage_bucket }}
      run: |
        gcloud --quiet storage cp --project="${PROJECT_ID}" \
          "${STORAGE_BUCKET}/enforce-blurbs/domains.md" /tmp/domains.md
        sed 's/^/- /g' -i /tmp/domains.md
        mv /tmp/domains.md data/domains.yaml

    - name: download ips.md from cloud storage
      shell: bash
      env:
        PROJECT_ID: ${{ inputs.project_id }}
        STORAGE_BUCKET: ${{ inputs.storage_bucket }}
      run: |
        gcloud --quiet storage cp --project="${PROJECT_ID}" \
          "${STORAGE_BUCKET}/enforce-blurbs/ips.md" /tmp/ips.md
        sed 's/^/- /g' -i /tmp/ips.md
        mv /tmp/ips.md data/ips.yaml
