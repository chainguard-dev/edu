name: Build all terminal images
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  build-image:
    runs-on: ubuntu-latest

    if: github.repository == 'chainguard-dev/edu'

    permissions:
      contents: read
      id-token: write # Federate with GCP and sign images

    strategy:
      matrix:
        image:
          - apko
          - cosign
          - policy-controller-base
          - policy-controller-install
          - rekor
          - vexctl

    container:
      image: ghcr.io/wolfi-dev/sdk:latest@sha256:a96b9173cb5dd9d6050ecb11b6ec326f47a32d93537838845be5e558f9103148
      # TODO: Deprivilege
      options: |
        --cap-add NET_ADMIN --cap-add SYS_ADMIN --device /dev/fuse --security-opt seccomp=unconfined --security-opt apparmor:unconfined

    steps:
      - name: 'Github Actions Runner'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: 'Checkout default branch to $GITHUB_WORKSPACE dir'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: melange keygen
        shell: bash
        working-directory: terminal-images/${{ matrix.image }}
        run: |
          melange keygen

      - name: melange build
        shell: bash
        working-directory: terminal-images/${{ matrix.image }}
        run: |
          melange build melange.yaml --arch x86_64 --signing-key melange.rsa

      - name: Authenticate to Google Cloud
        id: auth
        uses: step-security/google-github-auth@775fc4c80760272ef389c9f9f8d98de7db0c170d # v3.0.2
        with:
          service_account: "github-chainguard-academy@chainguard-academy.iam.gserviceaccount.com"
          workload_identity_provider: "projects/456977358484/locations/global/workloadIdentityPools/chainguard-academy/providers/chainguard-edu"
          token_format: 'access_token'

      - name: Setup G Cloud SDK
        uses: 'google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db' # v3.0.1

      - name: Configure GCR auth
        shell: bash
        env:
          TERMINAL_REGISTRY_URL: ${{ secrets.TERMINAL_REGISTRY_URL }}
        run: gcloud auth configure-docker "${TERMINAL_REGISTRY_URL}"

      - name: apko login
        shell: bash
        env:
          TERMINAL_REGISTRY_URL: ${{ secrets.TERMINAL_REGISTRY_URL }}
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          apko login \
            "${TERMINAL_REGISTRY_URL}" \
            --password="${ACCESS_TOKEN}" \
            --username="oauth2accesstoken"

      - name: apko publish
        shell: bash
        # working-directory: terminal-images/${{ matrix.image }}
        env:
          TERMINAL_REGISTRY_URL: ${{ secrets.TERMINAL_REGISTRY_URL }}
          TERMINAL_REPOSITORY: ${{ secrets.TERMINAL_REPOSITORY }}
          MATRIX_IMAGE: ${{ matrix.image }}
        run: |
          apko publish \
            --arch x86_64 apko.yaml \
            --image-refs image-refs.txt \
            "${TERMINAL_REGISTRY_URL}/${TERMINAL_REPOSITORY}/${MATRIX_IMAGE}:latest" \
            -k melange.rsa.pub \
            --sbom-path . \
            -C "terminal-images/${MATRIX_IMAGE}"

      # - name: cosign login
      #  shell: bash
      #  run: |
      #    cosign login \
      #      -p ${{ steps.auth.outputs.access_token }} \
      #      -u oauth2accesstoken \
      #      ${{ env.REGISTRY_URL }}

      # - name: cosign attest sbom
      #  working-directory: terminal-images/${{ matrix.image }}
      #  run: cosign attest -y --predicate sbom-x86_64.spdx.json --type spdxjson "$(cat image-refs.txt)"

      # - name: cosign sign image
      #  working-directory: terminal-images/${{ matrix.image }}
      #  run: cosign sign -y "$(cat image-refs.txt)

      - name: Post failure notice to Slack
        uses: step-security/action-slack-notify@e4cdee14a905d9da46ba47ad9309704407d8cd79 # v2.4.0
        if: ${{ failure() }}
        env:
          SLACK_ICON: http://github.com/chainguard-dev.png?size=48
          SLACK_USERNAME: guardian
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: 'alerts-edu'
          SLACK_COLOR: '#8E1600'
          MSG_MINIMAL: 'true'
          SLACK_TITLE: 'Build Terminal Images failed - ${{ github.repository }}'
          SLACK_MESSAGE: |
            For detailed logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
