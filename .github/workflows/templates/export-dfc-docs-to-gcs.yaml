# Template workflow for chainguard-dev/dfc repository
# Copy this to .github/workflows/export-docs-to-gcs.yaml in the dfc repo

name: Export DFC Mappings to GCS for AI Bundle

on:
  push:
    branches: [ main ]
    paths:
      - 'pkg/dfc/builtin-mappings.yaml'

  schedule:
    - cron: '30 1 * * 0'  # Weekly on Sundays at 1:30 AM

  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Authenticate to Google Cloud
      env:
        GCS_SA_KEY: ${{ secrets.GCS_SA_KEY }}
      run: |
        KEY_FILE=$(mktemp)
        trap "rm -f $KEY_FILE" EXIT
        echo "$GCS_SA_KEY" > "$KEY_FILE"
        gcloud auth activate-service-account --key-file="$KEY_FILE"

    - name: Prepare DFC mappings export
      run: |
        set -euo pipefail

        EXPORT_DIR=$(mktemp -d)
        trap "rm -rf $EXPORT_DIR" EXIT

        echo "Collecting DFC builtin mappings..."

        if [ -f "pkg/dfc/builtin-mappings.yaml" ]; then
          cp pkg/dfc/builtin-mappings.yaml "$EXPORT_DIR/"
          echo "Copied builtin-mappings.yaml"
        else
          echo "Error: pkg/dfc/builtin-mappings.yaml not found"
          exit 1
        fi

        # Create metadata file
        cat > "$EXPORT_DIR/metadata.json" << EOF
        {
          "repository": "${{ github.repository }}",
          "export_time": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
          "commit": "${{ github.sha }}",
          "ref": "${{ github.ref }}",
          "files_count": 1
        }
        EOF

        python3 -m json.tool "$EXPORT_DIR/metadata.json" > /dev/null

        cd "$(dirname "$EXPORT_DIR")"
        tar --owner=0 --group=0 --mode='u+rwX,go+rX,go-w' \
            -czf /tmp/docs-export.tar.gz "$(basename "$EXPORT_DIR")"

        echo "DFC mappings export created:"
        ls -lh /tmp/docs-export.tar.gz

    - name: Upload to GCS
      run: |
        set -euo pipefail

        echo "Uploading to gs://academy-all-docs/dfc/"

        gcloud storage cp /tmp/docs-export.tar.gz \
          "gs://academy-all-docs/dfc/docs-export.tar.gz" \
          --project=chainguard-academy \
          --content-type="application/gzip" \
          --cache-control="no-cache"

        # Extract for metadata upload
        EXPORT_DIR=$(mktemp -d)
        trap "rm -rf $EXPORT_DIR" EXIT
        tar -xzf /tmp/docs-export.tar.gz -C "$EXPORT_DIR" --strip-components=1

        gcloud storage cp "$EXPORT_DIR/metadata.json" \
          "gs://academy-all-docs/dfc/metadata.json" \
          --project=chainguard-academy \
          --content-type="application/json" \
          --cache-control="no-cache"

        echo "Successfully uploaded DFC mappings to GCS"

    - name: Trigger edu repo workflow
      if: github.event_name != 'workflow_dispatch'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.repos.createDispatchEvent({
            owner: 'chainguard-dev',
            repo: 'edu',
            event_type: 'ai-docs-source-updated',
            client_payload: {
              repository: '${{ github.repository }}',
              commit: '${{ github.sha }}',
              repo_path: 'dfc'
            }
          });
